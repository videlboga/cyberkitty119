# Minimal Squid config for VPN gateway
http_port 3128
visible_hostname vpn-gateway

# Basic ACLs: allow CONNECT to SSL ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

# Allow all (this is for internal, local network only — do not expose to the internet without auth)
http_access allow all

# Logging
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log
cache_dir ufs /var/spool/squid 100 16 256

# Do not cache large objects by default
maximum_object_size 16 MB
cache_mem 64 MB
