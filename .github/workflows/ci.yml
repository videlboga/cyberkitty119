name: CI

on:
  push:
    branches: [ main, master, feature/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install -r requirements-dev.txt
      - name: Run syntax check
        run: python -m compileall -q . && echo "compile OK"
      - name: Run tests
        run: PYTHONPATH=. pytest -q --ignore=tests/test_beta_mode.py --ignore=tests/test_content_processor.py
