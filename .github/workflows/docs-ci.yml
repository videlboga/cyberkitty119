name: Docs CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/**'
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - '.github/**'

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (python)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate docs front-matter
        run: |
          python .github/scripts/validate_metadata.py docs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run markdownlint
        run: |
          npx --yes markdownlint-cli@0.33.0 "docs/**/*.md"
